<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ogg-id.github.io</title>
  <link rel="icon" href="ogg-id.ico" type="image/x-icon">
  <style>
    body { margin:24px; font:15px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    a { color:inherit; text-decoration:none } a:hover{ text-decoration:underline }
    .line { white-space:pre }
  </style>
</head>
<body>
  <div id="root" class="line">📚 <strong>ogg-id.github.io</strong></div>
  <div id="list" class="line">memuat…</div>

  <script>
    const USER = "ogg-id";
    const BASE = `https://${USER}.github.io`;

    async function gh(url){
      const r = await fetch(url, { headers: { "Accept":"application/vnd.github+json" }});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }
    function branch(i, n){ return (i === n - 1) ? "└── " : "├── "; }

    (async function render(){
      const el = document.getElementById("list");
      try{
        // Ambil sampai 100 repo milik user, lalu filter yang has_pages = true
        const repos = await gh(`https://api.github.com/users/${USER}/repos?per_page=100&type=owner`);
        const live = repos
          .filter(r => r.has_pages && r.name.toLowerCase() !== `${USER}.github.io`) // exclude user-site repo
          .map(r => r.name)
          .sort((a,b)=> a.localeCompare(b)); // urut alfabet

        if(!live.length){
          el.textContent = "(belum ada Project Pages aktif)";
          return;
        }

        // Bentuk tree sederhana
        const lines = live.map((name, i) =>
          `${branch(i, live.length)}📂<a href="${BASE}/${encodeURIComponent(name)}/">${name}/</a>`
        );
        el.innerHTML = lines.join("\n");
      }catch(e){
        document.getElementById("root").textContent = "📚 ogg-id.github.io";
        el.textContent = `❌ Gagal memuat (${e.message})`;
      }
    })();
  </script>
</body>
</html>
